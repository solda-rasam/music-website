    <script>
      document.addEventListener('DOMContentLoaded', () => {
          const username = localStorage.getItem('username');
          const authContainer = document.getElementById('auth-buttons');

          if (username) {
              // تغییر ظاهر دکمه‌ها به پیغام خوش‌آمدگویی و دکمه خروج
              authContainer.innerHTML = `
                  <span style="color: white; margin-right: 15px; font-weight: bold; font-family: sans-serif;">Welcome, ${username}!</span>
                  <button id="logoutBtn" style="cursor: pointer; padding: 5px 10px; border-radius: 5px; border: none; background-color: #ff4d4d; color: white;">Logout</button>
              `;

              // عملکرد دکمه خروج (Logout)
              document.getElementById('logoutBtn').addEventListener('click', () => {
                  localStorage.removeItem('username'); // پاک کردن نام کاربر از حافظه
                  alert("Logged out successfully.");
                  window.location.reload(); // لود مجدد صفحه برای بازگشت دکمه‌ها به حالت پیش‌فرض
              });
          }
      });
    </script>
